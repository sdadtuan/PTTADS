# Phase 4 — campaign write + Nest scale smoke
name: phase4-scale

on:
  push:
    paths:
      - 'services/ptt-crm-api/**'
      - 'ptt_temporal/**'
      - 'ptt_meta/campaign_write.py'
      - 'ptt_crm/nest_api.py'
      - 'blueprints/agency.py'
      - 'tests/test_campaign_write_workflow.py'
      - 'docs/specs/2026-07-17-postgresql-ddl-v5-campaign-writes.sql'
      - '.github/workflows/phase4-scale.yml'
  pull_request:
    paths:
      - 'services/ptt-crm-api/**'
      - 'ptt_temporal/**'
      - 'ptt_meta/campaign_write.py'
      - 'ptt_crm/nest_api.py'
      - 'blueprints/agency.py'
      - 'tests/test_campaign_write_workflow.py'
      - 'docs/specs/2026-07-17-postgresql-ddl-v5-campaign-writes.sql'

jobs:
  nest-campaign-writes:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ptt
          POSTGRES_PASSWORD: ptt_dev
          POSTGRES_DB: ptt_agency
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ptt -d ptt_agency"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply PG DDL v5
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          export DATABASE_URL=postgresql://ptt:ptt_dev@127.0.0.1:5432/ptt_agency
          psql "$DATABASE_URL" -f docs/specs/2026-07-17-postgresql-ddl-v5-campaign-writes.sql
      - name: Nest build + campaign-writes e2e
        working-directory: services/ptt-crm-api
        env:
          DATABASE_URL: postgresql://ptt:ptt_dev@127.0.0.1:5432/ptt_agency
          PTT_CRM_API_AUTH_DISABLED: '1'
        run: |
          npm ci
          npm run build
          npm run test:e2e -- --testPathPattern=campaign-writes

  clickhouse-export:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ptt
          POSTGRES_PASSWORD: ptt_dev
          POSTGRES_DB: ptt_agency
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ptt -d ptt_agency"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply PG DDL v1 domain_events
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          export DATABASE_URL=postgresql://ptt:ptt_dev@127.0.0.1:5432/ptt_agency
          psql "$DATABASE_URL" -f docs/specs/2026-07-17-postgresql-ddl-v1.sql || true
          psql "$DATABASE_URL" -f docs/specs/2026-07-17-postgresql-ddl-v3-domain-events-idempotency.sql || true
      - name: ClickHouse export unit + e2e
        env:
          CLICKHOUSE_URL: http://127.0.0.1:8123
          CLICKHOUSE_USER: ptt
          CLICKHOUSE_PASSWORD: ptt_dev
        run: |
          python -m pip install psycopg2-binary
          PYTHONPATH=. python -m unittest tests.test_clickhouse_export
          chmod +x scripts/clickhouse_export_e2e.sh scripts/clickhouse_init.sh
          ./scripts/clickhouse_export_e2e.sh

  campaign-write-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Temporal deps
        run: python -m pip install -r requirements-temporal.txt
      - name: Campaign write workflow tests
        run: |
          PYTHONPATH=. python -m unittest tests.test_campaign_write_workflow \
            tests.test_meta_campaign_write_pilot
