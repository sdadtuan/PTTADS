# Phase 3 portal — build + unit/e2e smoke
name: phase3-portal

on:
  push:
    paths:
      - 'services/portal-web/**'
      - 'services/ptt-crm-api/**'
      - 'ptt_temporal/**'
      - 'tests/test_*workflow*.py'
      - '.github/workflows/phase3-portal.yml'
  pull_request:
    paths:
      - 'services/portal-web/**'
      - 'services/ptt-crm-api/**'
      - 'ptt_temporal/**'
      - 'tests/test_*workflow*.py'

jobs:
  nest-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ptt
          POSTGRES_PASSWORD: ptt_dev
          POSTGRES_DB: ptt_agency
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ptt -d ptt_agency"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply PG DDL (minimal)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y postgresql-client
          export DATABASE_URL=postgresql://ptt:ptt_dev@127.0.0.1:5432/ptt_agency
          for f in docs/specs/2026-07-17-postgresql-ddl-v3-leads-oltp.sql \
                   docs/specs/2026-07-17-postgresql-ddl-v3-performance.sql \
                   docs/specs/2026-07-17-postgresql-ddl-v3-creatives.sql; do
            psql "$DATABASE_URL" -f "$f" || true
          done
      - name: Nest build + portal password tests
        working-directory: services/ptt-crm-api
        run: |
          npm ci
          npm run build
          npm test -- --testPathPattern=portal-password

  python-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Temporal deps
        run: |
          python -m pip install -r requirements-temporal.txt
      - name: Workflow unit tests
        run: |
          PYTHONPATH=. python -m unittest tests.test_creative_approval_workflow \
            tests.test_client_onboarding_workflow tests.test_launch_qa_workflow \
            tests.test_google_insights_sync tests.test_campaign_write_workflow

  portal-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Portal build
        working-directory: services/portal-web
        run: |
          npm ci
          npm run build
