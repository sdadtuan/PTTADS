<header class="topbar crm-staff-topbar">
  <div class="container nav-wrap">
    <a href="{{ url_for('crm_staff_home') }}" class="logo brand-logo" aria-label="Portal nhân viên">
      <span class="brand-logo-text">Portal — {{ crm_staff_name }}</span>
    </a>
    <nav class="default-nav" aria-label="Menu nhân viên">
      <a href="{{ url_for('crm_staff_home') }}"{% if crm_staff_nav_active == 'home' %} class="is-active"{% endif %}>Trang chủ</a>
      <a href="{{ url_for('crm_leads_page') }}"{% if crm_staff_nav_active == 'leads' %} class="is-active"{% endif %}>Lead của tôi</a>
      <a href="{{ url_for('crm_kpi_page') }}"{% if crm_staff_nav_active == 'kpi' %} class="is-active"{% endif %}>KPI của tôi</a>
      <a href="{{ url_for('crm_daily_reports_page') }}"{% if crm_staff_nav_active == 'daily_reports' %} class="is-active"{% endif %}>Báo cáo ngày</a>
      <a href="{{ url_for('crm_board') }}"{% if crm_staff_nav_active == 'crm' %} class="is-active"{% endif %}>Chăm sóc KH</a>
      <a href="{{ url_for('crm_customers_page') }}"{% if crm_staff_nav_active == 'customers' %} class="is-active"{% endif %}>Khách hàng</a>
      <a href="{{ url_for('crm_payroll_page') }}"{% if crm_staff_nav_active == 'attendance' %} class="is-active"{% endif %}>Chấm công</a>
      <a href="{{ url_for('account_password_page') }}">Đổi mật khẩu</a>
      <form method="post" action="{{ url_for('admin_logout') }}" class="admin-logout-form crm-staff-logout">
        <button type="submit" class="btn-logout">Đăng xuất</button>
      </form>
    </nav>
  </div>
  <p class="container muted" style="margin:0;padding:0.35rem 1rem 0.65rem;font-size:0.8125rem;border-bottom:1px solid rgba(0,0,0,.06);">Chế độ <strong>nhân viên</strong> — xem KPI, Lead được gán và nộp báo cáo ngày. Cần quyền admin? <strong>Đăng xuất</strong> rồi đăng nhập lại.</p>
</header>
