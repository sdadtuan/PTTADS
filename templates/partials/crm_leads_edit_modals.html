<div class="crm-modal-root" id="crm-leads-modal" hidden>
  <div class="crm-modal-backdrop" data-close-leads-modal></div>
  <div class="crm-modal-panel crm-leads-form-modal" role="dialog" aria-modal="true" aria-labelledby="crm-leads-modal-title">
    <header class="crm-modal-head">
      <div>
        <p class="crm-modal-kicker">Lead CRM</p>
        <h2 id="crm-leads-modal-title">Lead</h2>
      </div>
      <button type="button" class="crm-modal-close" data-close-leads-modal aria-label="Đóng">×</button>
    </header>
    <form id="crm-leads-form" class="crm-modal-body crm-leads-lead-form">
      <input type="hidden" id="crm-leads-form-id" />
      <section class="crm-leads-form-section">
        <h3 class="crm-leads-form-section-title">Thông tin liên hệ</h3>
        <div class="crm-leads-form-grid">
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-name">Họ tên <span class="crm-leads-req">*</span></label>
            <input type="text" id="crm-leads-f-name" required autocomplete="name" />
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-phone">Số điện thoại</label>
            <input type="tel" id="crm-leads-f-phone" autocomplete="tel" />
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-email">Email</label>
            <input type="email" id="crm-leads-f-email" autocomplete="email" />
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-region">Khu vực</label>
            <input type="text" id="crm-leads-f-region" />
          </div>
        </div>
      </section>
      <section class="crm-leads-form-section">
        <h3 class="crm-leads-form-section-title">Nguồn & quan tâm</h3>
        <div class="crm-leads-form-grid">
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-source">Nguồn lead <span class="crm-leads-req">*</span></label>
            <select id="crm-leads-f-source" required></select>
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-project">Dự án BĐS</label>
            <select id="crm-leads-f-project"><option value="">— Chưa gán dự án —</option></select>
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-line">Dòng sản phẩm</label>
            <select id="crm-leads-f-line"><option value="">— Chọn dòng SP —</option></select>
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-zone">Phân khu</label>
            <select id="crm-leads-f-zone"><option value="">— Chọn phân khu —</option></select>
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-industry">Ngành khách hàng</label>
            <select id="crm-leads-f-industry"><option value="">— Chọn ngành —</option></select>
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-product">Dịch vụ quan tâm</label>
            <select id="crm-leads-f-product"><option value="">— Chọn dịch vụ —</option></select>
          </div>
        </div>
        <div class="crm-leads-form-field crm-leads-form-field--full">
          <label for="crm-leads-f-need">Nhu cầu / mô tả</label>
          <textarea id="crm-leads-f-need" rows="3"></textarea>
        </div>
      </section>
      <section class="crm-leads-form-section" id="crm-leads-edit-section" hidden>
        <h3 class="crm-leads-form-section-title">Pipeline & phân công</h3>
        <div class="crm-leads-form-grid">
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-status">Trạng thái</label>
            <select id="crm-leads-f-status"></select>
          </div>
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-level">Phân loại</label>
            <select id="crm-leads-f-level"><option value="">Tự động theo điểm</option></select>
          </div>
          {% if not crm_staff_portal | default(false) %}
          <div class="crm-leads-form-field">
            <label for="crm-leads-f-owner">Owner</label>
            <select id="crm-leads-f-owner"><option value="">Tự động gán</option></select>
          </div>
          {% endif %}
          <div class="crm-leads-form-field crm-leads-form-field--full">
            <label for="crm-leads-f-status-note">Ghi chú chuyển trạng thái</label>
            <input type="text" id="crm-leads-f-status-note" />
          </div>
        </div>
      </section>
      <p class="crm-form-msg is-warning" id="crm-leads-form-dup-hint" hidden></p>
      <p class="crm-form-msg is-error" id="crm-leads-form-err" hidden></p>
    </form>
    <footer class="crm-modal-foot">
      <button type="button" class="btn-secondary" data-close-leads-modal>Hủy</button>
      <button type="submit" form="crm-leads-form" class="btn" id="crm-leads-form-submit" data-admin-btn="crm_leads__btn_save">Lưu lead</button>
    </footer>
  </div>
</div>

<div class="crm-modal-root" id="crm-leads-assign-modal" hidden>
  <div class="crm-modal-backdrop" data-close-assign-modal></div>
  <div class="crm-modal-panel" role="dialog" aria-modal="true">
    <header class="crm-modal-head">
      <h2>Phân lại lead</h2>
      <button type="button" class="crm-modal-close" data-close-assign-modal>×</button>
    </header>
    <form id="crm-leads-assign-form" class="crm-modal-body">
      <label>Owner mới
        <select id="crm-leads-assign-owner" required></select>
      </label>
      <label>Lý do phân lại *
        <textarea id="crm-leads-assign-reason" rows="3" required></textarea>
      </label>
      <p class="crm-form-msg is-error" id="crm-leads-assign-err" hidden></p>
    </form>
    <footer class="crm-modal-foot">
      <button type="button" class="btn-secondary" data-close-assign-modal>Hủy</button>
      <button type="submit" form="crm-leads-assign-form" class="btn">Xác nhận</button>
    </footer>
  </div>
</div>

<div class="crm-modal-root" id="crm-leads-merge-modal" hidden data-admin-section-allow>
  <div class="crm-modal-backdrop" data-close-merge-modal></div>
  <div class="crm-modal-panel" role="dialog" aria-modal="true">
    <header class="crm-modal-head">
      <h2>Gộp lead trùng</h2>
      <button type="button" class="crm-modal-close" data-close-merge-modal>×</button>
    </header>
    <form id="crm-leads-merge-form" class="crm-modal-body">
      <p class="muted">Lead hiện tại là bản ghi chính. Chọn lead trùng để gộp.</p>
      <div id="crm-leads-merge-checkboxes"></div>
      <label>Lý do gộp<textarea id="crm-leads-merge-reason" rows="2"></textarea></label>
      <p class="crm-form-msg is-error" id="crm-leads-merge-err" hidden></p>
    </form>
    <footer class="crm-modal-foot">
      <button type="button" class="btn-secondary" data-close-merge-modal>Hủy</button>
      <button type="submit" form="crm-leads-merge-form" class="btn">Gộp</button>
    </footer>
  </div>
</div>
