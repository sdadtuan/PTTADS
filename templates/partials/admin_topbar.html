<header class="admin-topbar" role="banner">
  <div class="admin-topbar-inner">
    <button type="button" class="admin-sidebar-toggle" id="admin-sidebar-toggle" aria-controls="admin-sidebar" aria-expanded="false" aria-label="Mở menu quản trị">
      <span aria-hidden="true"></span>
    </button>
    <a href="{{ url_for('admin') }}" class="admin-topbar-brand">
      <span class="admin-topbar-brand-kicker">PTT</span>
      <span class="admin-topbar-brand-title">Quản trị nội bộ</span>
    </a>
    <div class="admin-topbar-spacer"></div>
    <a href="{{ url_for('landing') }}" class="admin-topbar-link" title="Xem trang công khai">Trang chủ</a>
    <a href="{{ url_for('crm_hdsd_page') }}" class="admin-topbar-link admin-topbar-link--hdsd">HDSD</a>
    <a href="{{ url_for('crm_test_cases_download_xlsx') }}" class="admin-topbar-link">Test case</a>
    <a href="{{ url_for('account_password_page') }}" class="admin-topbar-link">Đổi mật khẩu</a>
    <div class="admin-topbar-user" title="{{ admin_ui_role | default('') }}">
      <span class="admin-topbar-user-name">{{ admin_ui_user | default('Admin') }}</span>
      {% if admin_ui_role %}
      <span class="admin-topbar-user-role">{{ admin_ui_role }}</span>
      {% endif %}
    </div>
    <form method="post" action="{{ url_for('admin_logout') }}" class="admin-logout-form admin-topbar-logout">
      <button type="submit" class="btn-logout">Đăng xuất</button>
    </form>
  </div>
</header>
<div class="admin-sidebar-backdrop" id="admin-sidebar-backdrop" hidden></div>
