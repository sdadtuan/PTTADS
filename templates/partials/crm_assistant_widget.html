<link rel="stylesheet" href="{{ url_for('static', filename='crm_assistant.css') }}?v={{ static_v('crm_assistant.css') }}" />

<div class="ptt-crm-ai-launcher" id="pttCrmAiLauncher" data-admin-section="crm_assistant" data-admin-action="view" hidden>
  <button type="button" class="ptt-crm-ai-fab" id="pttCrmAiFab" aria-label="Mở trợ lý CRM" title="Trợ lý CRM">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 3a7 7 0 0 1 7 7c0 2.4-1.2 4.5-3 5.7V18a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2.3C6.2 14.5 5 12.4 5 10a7 7 0 0 1 7-7z" stroke="currentColor" stroke-width="1.6"/>
      <path d="M9 21h6M10 9h.01M14 9h.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<div class="ptt-crm-ai-panel" id="pttCrmAiPanel" hidden aria-label="Trợ lý CRM PTT">
  <header class="ptt-crm-ai-head">
    <div class="ptt-crm-ai-head__text">
      <h3 id="pttCrmAiTitle">Trợ lý CRM</h3>
      <p id="pttCrmAiSubtitle">Playbook · Pipeline · CSKH</p>
      <p class="ptt-crm-ai-head__ctx" id="pttCrmAiCtx" hidden></p>
      <p class="ptt-crm-ai-head__note" id="pttCrmAiNote"></p>
    </div>
    <div class="ptt-crm-ai-head__tools">
      <button type="button" class="ptt-crm-ai-tool" id="pttCrmAiExportMd" title="Xuất Markdown">MD</button>
      <button type="button" class="ptt-crm-ai-tool" id="pttCrmAiClear" aria-label="Xóa hội thoại" title="Xóa hội thoại">↺</button>
      <button type="button" class="ptt-crm-ai-close" id="pttCrmAiClose" aria-label="Đóng">×</button>
    </div>
  </header>
  <div class="ptt-crm-ai-body">
    <div class="ptt-crm-ai-msgs" id="pttCrmAiMsgs" role="log" aria-live="polite"></div>
    <div class="ptt-crm-ai-typing" id="pttCrmAiTyping" hidden>Đang phân tích playbook &amp; pipeline…</div>
  </div>
  <div class="ptt-crm-ai-modules" id="pttCrmAiModules" aria-label="Chủ đề nhanh"></div>
  <div class="ptt-crm-ai-quick" id="pttCrmAiQuick"></div>
  <footer class="ptt-crm-ai-compose">
    <textarea id="pttCrmAiInput" rows="2" placeholder="Hỏi về quy trình CSKH, pipeline, SLA…" maxlength="4000"></textarea>
    <button type="button" class="ptt-crm-ai-send" id="pttCrmAiSend">Gửi</button>
  </footer>
</div>

{% set _jcrm = static_js_file('crm_assistant.js') %}
<script src="{{ url_for('static', filename=_jcrm) }}?v={{ static_v(_jcrm) }}" defer></script>
