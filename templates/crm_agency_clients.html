{% extends "admin_layout.html" %}
{% block admin_main %}
<link rel="stylesheet" href="{{ url_for('static', filename='crm_agency.css') }}">
<script defer src="{{ url_for('static', filename='crm_agency.js') }}"></script>
{% include "partials/crm_agency_ui.html" %}
<div class="agency-wrap" data-agency-page="clients" data-is-new="{{ '1' if is_new else '0' }}">
  <header class="agency-header">
    <div>
      <p class="agency-eyebrow">Agency Ops</p>
      <h1>Khách hàng agency</h1>
      <p class="agency-muted">Quản lý client, onboarding và kênh quảng cáo</p>
    </div>
    <button type="button" class="btn" id="agency-btn-new-client">+ Tạo client</button>
  </header>

  <div class="agency-toolbar">
    <input type="search" id="agency-client-search" placeholder="Tìm mã hoặc tên…" class="agency-input" aria-label="Tìm kiếm">
    <select id="agency-client-status" class="agency-input" aria-label="Trạng thái">
      <option value="">Tất cả trạng thái</option>
      <option value="onboarding">Đang onboard</option>
      <option value="active">Hoạt động</option>
      <option value="paused">Tạm dừng</option>
    </select>
    <input type="search" id="agency-client-am" placeholder="AM phụ trách…" class="agency-input" aria-label="AM">
    <input type="search" id="agency-client-industry" placeholder="Ngành…" class="agency-input" aria-label="Ngành">
    <button type="button" class="btn btn-secondary" id="agency-client-refresh">Làm mới</button>
  </div>

  <div id="agency-client-form" class="agency-panel" hidden>
    <h2>Tạo client mới</h2>
    <div class="agency-form-grid">
      <label>Mã client <span>VD: PTT, ABC_CORP</span><input id="agency-f-code" class="agency-input" placeholder="PTT" maxlength="32"></label>
      <label>Tên công ty <span>Bắt buộc</span><input id="agency-f-name" class="agency-input" required></label>
      <label>Ngành <span>VD: real_estate, fmcg</span><input id="agency-f-industry" class="agency-input" placeholder="real_estate"></label>
      <label>AM phụ trách <span>ID hoặc tên AM</span><input id="agency-f-am" class="agency-input" placeholder="am_01"></label>
    </div>
    <button type="button" class="btn" id="agency-f-submit">Lưu client</button>
    <p id="agency-f-error" class="agency-error" hidden></p>
  </div>

  <div class="agency-table-wrap" id="agency-clients-table-wrap">
    <table class="agency-table" id="agency-clients-table">
      <thead>
        <tr>
          <th>Mã</th>
          <th>Tên</th>
          <th>AM</th>
          <th>Ngành</th>
          <th>Trạng thái</th>
          <th>Kênh</th>
          <th>Cập nhật</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div id="agency-clients-empty" hidden></div>
</div>
{% endblock %}
