<div
  id="career-modal-root"
  class="career-modal-root"
  aria-hidden="true"
  hidden
>
  <div class="career-modal-backdrop" data-career-modal-close tabindex="-1"></div>
  <div
    class="career-modal-panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="career-modal-title"
  >
    <div class="career-modal-header-bar">
      <p class="career-modal-brand">{{ settings.brand_name if settings else "PTT Advertising Solutions" }}</p>
      <button
        type="button"
        class="career-modal-close"
        aria-label="Đóng"
        data-career-modal-close
      >
        <span aria-hidden="true">×</span>
      </button>
    </div>
    <div class="career-modal-body" id="career-modal-content"></div>
  </div>
</div>
