{% extends "admin_layout.html" %}
{% block admin_main %}
<link rel="stylesheet" href="{{ url_for('static', filename='crm_agency.css') }}">
<script defer src="{{ url_for('static', filename='crm_agency.js') }}"></script>
{% include "partials/crm_agency_ui.html" %}
<div class="agency-wrap" data-agency-page="notifications">
  <header class="agency-header">
    <div>
      <p class="agency-eyebrow">Agency Ops</p>
      <h1>Thông báo</h1>
      <p class="agency-muted">SLA breach · Ingest · Hệ thống</p>
    </div>
    <button type="button" class="btn btn-secondary" id="agency-notif-read-all">Đánh dấu tất cả đã đọc</button>
  </header>

  <nav class="agency-tabs" id="agency-notif-tabs" aria-label="Lọc thông báo">
    <button type="button" class="agency-tab is-active" data-category="">Tất cả</button>
    <button type="button" class="agency-tab" data-category="sla">SLA</button>
    <button type="button" class="agency-tab" data-category="ingest">Ingest</button>
    <button type="button" class="agency-tab" data-category="system">Hệ thống</button>
  </nav>

  <ul id="agency-notif-list" class="agency-notif-list"></ul>
</div>
{% endblock %}
