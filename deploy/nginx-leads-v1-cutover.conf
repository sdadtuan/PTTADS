# Nginx — CRM Leads read API v1 cutover (Phase 1b Bước 8)
#
# Thêm vào server block api.pttads.vn (hoặc pttads.vn nếu dùng chung host).
# Routing nest/flask được sinh bởi: ./scripts/apply_leads_read_upstream.sh
#
# Yêu cầu trên VPS:
#   1. ptt-crm-api chạy :3000 (systemd ptt-crm-api.service hoặc docker compose)
#   2. Flask Gunicorn :8002 (ptt.service)
#   3. Biến PTT_CRM_INTERNAL_KEY trong .env — map vào $ptt_crm_internal_key bên dưới
#
# Apply:
#   sudo ./scripts/apply_leads_read_upstream.sh
#   # hoặc copy deploy/nginx-leads-v1-upstream-*.conf → /etc/nginx/snippets/

upstream ptt_flask_app {
    server 127.0.0.1:8002;
    keepalive 8;
}

upstream ptt_nest_crm_api {
    server 127.0.0.1:3000;
    keepalive 8;
}

# Secret — thay bằng giá trị thật hoặc include từ file riêng (chmod 600)
