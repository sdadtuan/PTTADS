# ops.pttads.vn — redirect canonical staff URL → rs.pttads.vn
#
# Apply:
#   sudo cp deploy/nginx-ops.conf /etc/nginx/sites-available/ops.pttads.vn
#   sudo ln -sf /etc/nginx/sites-available/ops.pttads.vn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    http2 on;
    server_name ops.pttads.vn;

    ssl_certificate     /etc/nginx/ssl/portalpttadsvn.pem;
    ssl_certificate_key /etc/nginx/ssl/portalpttadsvn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        return 301 https://rs.pttads.vn$request_uri;
    }
}

server {
    listen 80;
    server_name ops.pttads.vn;
    return 301 https://rs.pttads.vn$request_uri;
}
