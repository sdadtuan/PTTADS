# Generated by scripts/apply_leads_read_upstream.sh — NEST mode
# Do not edit manually; re-run apply script after changing PTT_LEADS_READ_UPSTREAM.

location ^~ /api/v1/leads {
    proxy_pass http://ptt_nest_crm_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_set_header X-PTT-Internal-Key $ptt_crm_internal_key;
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;
}
