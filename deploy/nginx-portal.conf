# Phase 3 — portal.pttads.vn (Client Portal + Nest API same-origin)
#
#   /           → Next.js :3100
#   /api/       → Nest CRM API :3000
#   /health     → Nest health check
#
# TLS: /etc/nginx/ssl/portalpttadsvn.{pem,key} (shared VPS cert)
# Apply:
#   sudo cp deploy/nginx-portal.conf /etc/nginx/sites-available/portal.pttads.vn
#   sudo ln -sf /etc/nginx/sites-available/portal.pttads.vn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream ptt_portal_web {
    server 127.0.0.1:3100;
    keepalive 16;
}

upstream ptt_nest_crm_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 443 ssl;
    http2 on;
    server_name portal.pttads.vn;

    ssl_certificate     /etc/nginx/ssl/portalpttadsvn.pem;
    ssl_certificate_key /etc/nginx/ssl/portalpttadsvn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Nest CRM API (portal login, performance, creatives, campaign-writes)
    location /api/ {
        proxy_pass http://ptt_nest_crm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://ptt_nest_crm_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Next.js client portal
    location / {
        proxy_pass http://ptt_portal_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name portal.pttads.vn;
    return 301 https://$host$request_uri;
}
