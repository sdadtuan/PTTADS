# rs.pttads.vn — Staff console canonical (ops-web + Nest API)
#
# ops.pttads.vn redirects here (deploy/nginx-ops.conf)
#
# Apply:
#   sudo cp deploy/nginx-rs-flask-retired.conf /etc/nginx/sites-available/rs.pttads.vn
#   sudo nginx -t && sudo systemctl reload nginx

upstream ptt_ops_web {
    server 127.0.0.1:3200;
    keepalive 16;
}

upstream ptt_nest_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 443 ssl;
    http2 on;
    server_name rs.pttads.vn;

    ssl_certificate     /etc/letsencrypt/live/rs.pttads.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rs.pttads.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 32m;

    # Webhooks + CRM API (Nest)
    location /api/ {
        proxy_pass http://ptt_nest_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_set_header X-Hub-Signature $http_x_hub_signature;
        proxy_set_header X-Zalo-Signature $http_x_zalo_signature;
        proxy_set_header X-PTT-Client-Id $http_x_ptt_client_id;
        proxy_set_header X-Correlation-Id $http_x_correlation_id;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://ptt_nest_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Next.js static assets — serve from disk (standalone build)
    location /_next/static/ {
        alias /var/www/ptt/services/ops-web/.next/standalone/.next/static/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js staff console (ops-web)
    location / {
        proxy_pass http://ptt_ops_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name rs.pttads.vn;
    return 301 https://$host$request_uri;
}
