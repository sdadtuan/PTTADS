# rs.pttads.vn — Phase 5 Flask retired (redirect legacy admin → ops-web)
#
# Apply (close_flask_retirement.sh copies this file):
#   sudo cp deploy/nginx-rs-flask-retired.conf /etc/nginx/sites-available/rs.pttads.vn
#   sudo nginx -t && sudo systemctl reload nginx
#
# Rollback:
#   sudo cp /etc/nginx/sites-available/rs.pttads.vn.pre-phase5.bak /etc/nginx/sites-available/rs.pttads.vn
#   sudo systemctl enable --now ptt.service

upstream ptt_ops_web {
    server 127.0.0.1:3200;
    keepalive 8;
}

upstream ptt_nest_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 443 ssl;
    http2 on;
    server_name rs.pttads.vn;

    ssl_certificate     /etc/letsencrypt/live/rs.pttads.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rs.pttads.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 32m;

    # Migrated CRM / Agency → ops-web
    location = /crm/leads {
        return 302 https://ops.pttads.vn/crm/leads;
    }
    location ^~ /crm/leads/ {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location = /crm/agency {
        return 302 https://ops.pttads.vn/agency;
    }
    location ^~ /crm/agency/ {
        return 302 https://ops.pttads.vn/agency$request_uri;
    }
    location = /crm/hub {
        return 302 https://ops.pttads.vn/crm/hub;
    }
    location ^~ /crm/catalog {
        return 302 https://ops.pttads.vn/crm/catalog;
    }
    location ^~ /crm/seo {
        return 302 https://ops.pttads.vn/seo/hub;
    }
    location ^~ /seo/ {
        proxy_pass http://ptt_ops_web;
        proxy_http_version 1.1;
        proxy_set_header Host ops.pttads.vn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nest internal API (if rs domain still used for legacy bookmarks)
    location ^~ /api/ {
        proxy_pass http://ptt_nest_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://ptt_nest_api/health;
    }

    # Legacy Flask HTML retired — redirect to ops-web
    location / {
        return 302 https://ops.pttads.vn/;
    }
}

server {
    listen 80;
    server_name rs.pttads.vn;
    return 301 https://$host$request_uri;
}
