# Nginx — proxy webhook Facebook (thêm vào server block pttads.vn)
#
# Meta gửi POST JSON + header X-Hub-Signature-256.
# URL phải https://pttads.vn/... KHÔNG có dấu / cuối — nếu không Meta nhận 404 → delivery.rejected

# Redirect trailing slash (Meta đôi khi đăng ký URL có / cuối)
location = /api/crm/integration/webhooks/facebook/ {
    return 308 https://$host/api/crm/integration/webhooks/facebook$is_args$args;
}

location = /api/crm/integration/webhooks/facebook {
    proxy_pass http://127.0.0.1:8002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
    proxy_set_header X-Hub-Signature $http_x_hub_signature;
    proxy_pass_request_body on;
    proxy_pass_request_headers on;
    client_max_body_size 2m;
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;
}
