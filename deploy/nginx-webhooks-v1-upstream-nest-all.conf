# Generated by scripts/apply_webhooks_upstream.sh — NEST-ALL mode (Phase 1)
# All /api/v1/webhooks/* → NestJS (PG job_queue ingest)

upstream ptt_flask_app {
    server 127.0.0.1:8002;
    keepalive 8;
}

upstream ptt_nest_crm_api {
    server 127.0.0.1:3000;
    keepalive 8;
}

location ^~ /api/v1/webhooks/ {
    proxy_pass http://ptt_nest_crm_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
    proxy_set_header X-Hub-Signature $http_x_hub_signature;
    proxy_set_header X-PTT-Client-Id $http_x_ptt_client_id;
    proxy_set_header X-Correlation-Id $http_x_correlation_id;
    proxy_pass_request_body on;
    proxy_pass_request_headers on;
    client_max_body_size 2m;
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;
}

location = /api/v1/webhooks/facebook {
    return 308 $scheme://$host/api/v1/webhooks/meta$is_args$args;
}

location = /api/v1/channels {
    proxy_pass http://ptt_nest_crm_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}
