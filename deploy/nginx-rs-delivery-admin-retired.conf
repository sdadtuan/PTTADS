# rs.pttads.vn — Phase 5 partial: SEO + Email admin retired from Flask → ops-web
#
# Flask monolith STILL RUNS for legacy CRM routes not yet migrated.
# Apply: close_flask_retirement_delivery_admin.sh
#
# Rollback: restore rs.pttads.vn.pre-delivery-admin.bak

upstream ptt_flask {
    server 127.0.0.1:8002;
    keepalive 8;
}

upstream ptt_ops_web {
    server 127.0.0.1:3200;
    keepalive 8;
}

upstream ptt_nest_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 443 ssl;
    http2 on;
    server_name rs.pttads.vn;

    ssl_certificate     /etc/nginx/ssl/portalpttadsvn.pem;
    ssl_certificate_key /etc/nginx/ssl/portalpttadsvn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 32m;

    # SEO admin — Flask retired → ops-web
    location ^~ /crm/seo {
        return 302 https://ops.pttads.vn/seo/hub;
    }
    location ^~ /crm/aeo {
        return 302 https://ops.pttads.vn/seo/hub;
    }

    # Email admin never existed on Flask; block legacy bookmarks
    location ^~ /crm/email {
        return 302 https://ops.pttads.vn/email/hub;
    }

    # Meta / Facebook Ads hub — Flask retired → ops-web (Horizon 1)
    location ^~ /crm/facebook-ads {
        return 302 https://ops.pttads.vn/meta/facebook-ads;
    }

    # Wave 1 — CRM catalog → ops-web
    location ^~ /crm/catalog {
        return 302 https://ops.pttads.vn/crm/catalog;
    }

    # Partially migrated CRM/agency (same as full retirement pack)
    location = /crm/leads {
        return 302 https://ops.pttads.vn/crm/leads;
    }
    location ^~ /crm/leads/ {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location ^~ /crm/customers {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location ^~ /crm/intake {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location = /crm/marketing-plan {
        return 302 https://ops.pttads.vn/crm/marketing-plan;
    }
    location ^~ /crm/marketing-plan/ {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location = /crm/service-delivery {
        return 302 https://ops.pttads.vn/crm/service-delivery;
    }
    location ^~ /crm/service-delivery/ {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location = /crm/sop {
        return 302 https://ops.pttads.vn/crm/sop;
    }
    location = /crm/sales {
        return 302 https://ops.pttads.vn/crm/sales;
    }
    location = /crm/kpi {
        return 302 https://ops.pttads.vn/crm/kpi;
    }
    location = /crm/staff-kpi {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location = /crm/staff {
        return 302 https://ops.pttads.vn/crm/staff;
    }
    location = /crm/proposals {
        return 302 https://ops.pttads.vn/crm/proposals;
    }
    location ^~ /crm/proposals/ {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location = /crm/re-projects {
        return 302 https://ops.pttads.vn/crm/re-projects;
    }
    location ^~ /crm/re-projects/ {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location = /crm/payroll {
        return 302 https://ops.pttads.vn/crm/payroll;
    }
    location ^~ /crm/payroll/ {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location ^~ /crm/staff/ {
        return 302 https://ops.pttads.vn$request_uri;
    }
    location = /crm/agency {
        return 302 https://ops.pttads.vn/agency;
    }
    location ^~ /crm/agency/ {
        return 302 https://ops.pttads.vn/agency$request_uri;
    }
    location = /crm/hub {
        return 302 https://ops.pttads.vn/crm/hub;
    }

    location ^~ /api/ {
        proxy_pass http://ptt_nest_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://ptt_nest_api/health;
    }

    # Remaining Flask CRM (until full Phase 5 retirement)
    location / {
        proxy_pass http://ptt_flask;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name rs.pttads.vn;
    return 301 https://$host$request_uri;
}
