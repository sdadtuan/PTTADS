# VPS TLS — copy to sites or: include deploy/nginx-ssl-vps-snippet.conf;
# All *.pttads.vn hosts on this VPS share one cert pair.
ssl_certificate     /etc/nginx/ssl/portalpttadsvn.pem;
ssl_certificate_key /etc/nginx/ssl/portalpttadsvn.key;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
