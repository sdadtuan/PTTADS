# Agency CRM — rs.pttads.vn (Flask Gunicorn :8002)
#
#   /admin, /cms, /crm/*  → Flask :8002
#
# TLS: /etc/nginx/ssl/portalpttadsvn.{pem,key}
# Apply:
#   sudo cp deploy/nginx-agency.conf /etc/nginx/sites-available/rs.pttads.vn
#   sudo ln -sf /etc/nginx/sites-available/rs.pttads.vn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# First-time TLS (HTTP-only until cert exists):
#   Comment out the ssl server block, keep port 80 proxy, run certbot, then restore full file.

upstream ptt_flask_agency {
    server 127.0.0.1:8002;
    keepalive 16;
}

server {
    listen 443 ssl;
    http2 on;
    server_name rs.pttads.vn;

    ssl_certificate     /etc/nginx/ssl/portalpttadsvn.pem;
    ssl_certificate_key /etc/nginx/ssl/portalpttadsvn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 32m;

    location / {
        proxy_pass http://ptt_flask_agency;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name rs.pttads.vn;
    return 301 https://$host$request_uri;
}
